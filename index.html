<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Salon Demo Hub</title>
<meta name="description" content="Kadıköy salon demoları — telefon kontrol paneli" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#F6F7F9" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0B0D10" media="(prefers-color-scheme: dark)" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Salon Hub" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;650;700&display=swap" rel="stylesheet" />
<style>
  :root{
    color-scheme: light dark;
    --bg:#F6F7F9;
    --surface:#FFFFFF;
    --surface-2:#FBFBFC;
    --line:#E7E9EE;
    --line-2:#EDEFF3;
    --divider:#EEF0F4;
    --ink:#0E1320;
    --ink-2:#5A6473;
    --muted:#98A0AE;
    --accent:#111827;      /* near-black primary */
    --accent-ink:#FFFFFF;  /* text on primary */
    --ok:#12B76A;
    --ok-bg:#ECFDF3;
    --ok-line:#CDF2DE;
    --ok-ink:#067647;
    --amber-bg:#FFFAEB;
    --amber-line:#FDE7B0;
    --amber-ink:#B54708;
    --ring:rgba(17,24,39,.14);
    --sh-1:0 1px 2px rgba(16,24,40,.06), 0 1px 3px rgba(16,24,40,.10);
    --sh-2:0 4px 8px rgba(16,24,40,.06), 0 8px 24px rgba(16,24,40,.10);
    --grid:rgba(16,24,40,.030);
    --scrim:linear-gradient(180deg,transparent 60%,rgba(16,24,40,.10));
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0B0D10;
      --surface:#14171C;
      --surface-2:#171B21;
      --line:#232830;
      --line-2:#2C323B;
      --divider:#232830;
      --ink:#ECEEF2;
      --ink-2:#98A0AE;
      --muted:#6B7480;
      --accent:#ECEEF2;
      --accent-ink:#0B0D10;
      --ok:#3CCB85;
      --ok-bg:#0E2A1C;
      --ok-line:#1C4A33;
      --ok-ink:#5BD79A;
      --amber-bg:#2A2010;
      --amber-line:#4A3A1A;
      --amber-ink:#E8B864;
      --ring:rgba(236,238,242,.18);
      --sh-1:0 1px 2px rgba(0,0,0,.40), 0 1px 3px rgba(0,0,0,.50);
      --sh-2:0 6px 14px rgba(0,0,0,.45), 0 12px 32px rgba(0,0,0,.55);
      --grid:rgba(255,255,255,.026);
      --scrim:linear-gradient(180deg,transparent 55%,rgba(0,0,0,.35));
    }
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    background:
      linear-gradient(180deg, color-mix(in srgb, var(--bg) 92%, var(--surface)) 0%, var(--bg) 240px),
      var(--bg);
    color:var(--ink);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px;line-height:1.5;font-weight:450;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    padding:max(18px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right))
            calc(44px + env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-left));
    max-width:540px;margin:0 auto;min-height:100dvh;position:relative;
  }
  /* faint grid texture — dense at top, fades down (mask) for depth */
  body::before{
    content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background-image:radial-gradient(var(--grid) 1px, transparent 1px);
    background-size:22px 22px;
    -webkit-mask-image:linear-gradient(180deg,#000 0%,transparent 46%);
    mask-image:linear-gradient(180deg,#000 0%,transparent 46%);
  }
  a{color:inherit;text-decoration:none}
  button{font-family:inherit}
  svg{display:block}
  ::selection{background:color-mix(in srgb, var(--accent) 22%, transparent)}
  .ic{width:16px;height:16px;flex:none;stroke:currentColor;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .tnum{font-variant-numeric:tabular-nums}

  /* focus-visible ring (keyboard / a11y) */
  .btn:focus-visible,.lead:focus-visible,.hook:focus-visible,
  .seemsg:focus-visible,#install:focus-visible,.thumb-wrap:focus-visible{
    outline:none;box-shadow:0 0 0 3px var(--ring)
  }

  /* ===== Header ===== */
  .head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin:2px 2px 0}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .logo{width:38px;height:38px;border-radius:11px;flex:none;display:grid;place-items:center;
        background:var(--surface);border:1px solid var(--line);box-shadow:var(--sh-1);color:var(--ink)}
  .logo .ic{width:19px;height:19px;stroke-width:1.6}
  .htxt h1{font-size:19px;font-weight:650;letter-spacing:-.02em;margin:0;line-height:1.15}
  .gen{font-size:12px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:5px}
  .gen .dot{width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 3px var(--ok-bg)}
  #install{display:none;align-items:center;gap:6px;border:1px solid var(--line);background:var(--surface);
           color:var(--ink);font-size:13px;font-weight:550;padding:8px 12px;border-radius:11px;cursor:pointer;
           box-shadow:var(--sh-1);transition:transform .15s ease,box-shadow .15s ease;white-space:nowrap}
  #install:hover{box-shadow:var(--sh-2);transform:translateY(-1px)}
  #install:active{transform:scale(.98)}

  /* ===== iOS hint ===== */
  .ios{display:none;align-items:flex-start;gap:10px;background:var(--surface);border:1px solid var(--line);
       border-radius:14px;padding:12px 14px;font-size:13px;color:var(--ink-2);margin:16px 0 0;box-shadow:var(--sh-1)}
  .ios .ic{margin-top:1px;color:var(--ink)}
  .ios b{color:var(--ink);font-weight:550}

  /* ===== Stats ===== */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0 0}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px 14px 13px;
        box-shadow:var(--sh-1);position:relative;overflow:hidden}
  .stat::after{content:"";position:absolute;inset:0 0 auto 0;height:1px;
        background:linear-gradient(90deg,transparent,var(--line-2),transparent)}
  .stat .n{font-size:30px;font-weight:700;letter-spacing:-.02em;line-height:1;color:var(--ink)}
  .stat .l{font-size:12px;color:var(--muted);margin-top:7px;font-weight:500;text-transform:uppercase;letter-spacing:.06em}

  /* ===== Note ===== */
  .note{display:flex;gap:11px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);
        border-radius:16px;padding:14px;font-size:13.5px;color:var(--ink-2);margin:14px 0 4px;
        box-shadow:var(--sh-1);line-height:1.55}
  .note .ic{margin-top:1px;color:var(--ink)}

  /* ===== Section labels ===== */
  .sec{display:flex;align-items:center;gap:9px;margin:30px 4px 13px}
  .sec span{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600}
  .sec .ic{width:14px;height:14px;color:var(--muted)}
  .sec .rule{flex:1;height:1px;background:var(--divider)}

  /* ===== Cards ===== */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;overflow:hidden;
        margin-bottom:14px;box-shadow:var(--sh-1);transition:transform .18s ease,box-shadow .18s ease}
  @media (hover:hover){ .card:hover{box-shadow:var(--sh-2);transform:translateY(-1px)} }
  .thumb-wrap{display:block;position:relative;background:var(--surface-2)}
  .thumb{display:block;width:100%;aspect-ratio:16/10;object-fit:cover;object-position:top center;
         background:var(--surface-2);border-bottom:1px solid var(--line)}
  .thumb-wrap::after{content:"";position:absolute;inset:0;background:var(--scrim);pointer-events:none}
  .live-tag{position:absolute;top:10px;left:10px;z-index:2;display:flex;align-items:center;gap:5px;
        font-size:11px;font-weight:600;letter-spacing:.02em;color:var(--ok-ink);background:var(--ok-bg);
        border:1px solid var(--ok-line);border-radius:999px;padding:4px 9px;
        -webkit-backdrop-filter:saturate(1.4) blur(4px);backdrop-filter:saturate(1.4) blur(4px)}
  .live-tag .d{width:6px;height:6px;border-radius:999px;background:var(--ok)}
  .cb{padding:15px 16px 16px}
  .nm{font-size:18px;font-weight:650;letter-spacing:-.01em;display:flex;align-items:center;gap:8px;color:var(--ink)}
  .nm .em{font-size:18px;line-height:1}
  .sg{color:var(--ink-2);font-size:13px;margin-top:3px}

  .btns{display:flex;gap:9px;margin-top:15px}
  .btn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;text-align:center;
       border-radius:12px;padding:11px 10px;font-size:14px;font-weight:550;cursor:pointer;
       border:1px solid var(--line);background:var(--surface);color:var(--ink);
       transition:transform .15s ease,box-shadow .15s ease,background .15s ease,border-color .15s ease,color .15s ease}
  .btn .ic{width:15px;height:15px}
  .btn:active{transform:scale(.98)}
  .btn.ghost:hover{border-color:var(--line-2);background:var(--surface-2);box-shadow:var(--sh-1)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);box-shadow:var(--sh-1)}
  .btn.primary:hover{box-shadow:var(--sh-2);transform:translateY(-1px)}
  .btn.primary:active{transform:scale(.98)}
  .btn.ghost.copied{border-color:var(--ok-line);background:var(--ok-bg);color:var(--ok-ink)}
  .btn.ghost.copied .ic{color:var(--ok-ink)}

  .seemsg{margin-top:13px;display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-2);
          font-weight:500;cursor:pointer;transition:color .15s ease;border-radius:8px;padding:2px 0}
  .seemsg:hover{color:var(--ink)}
  .seemsg .ic{width:14px;height:14px;transition:transform .2s ease}
  .seemsg.open .ic{transform:rotate(180deg)}
  .msg{margin-top:0;max-height:0;overflow:hidden;transition:max-height .28s ease,margin-top .28s ease}
  .msg.open{max-height:1400px;margin-top:13px}
  .msg .inner{border-top:1px solid var(--divider);padding-top:13px}
  .msg p{white-space:pre-wrap;font-size:13.5px;color:var(--ink-2);margin:0;line-height:1.6}

  /* ===== Reel ===== */
  .reel .kon{font-size:13.5px;color:var(--ink-2);margin:6px 0 14px;line-height:1.55}
  .hk-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;margin-bottom:9px}
  .hooks{display:flex;flex-direction:column;gap:9px}
  .hook{display:flex;align-items:flex-start;gap:10px;background:var(--surface-2);border:1px solid var(--line);
        border-radius:12px;padding:11px 12px;font-size:13px;color:var(--ink);cursor:pointer;line-height:1.5;
        text-align:left;width:100%;font-weight:450;
        transition:border-color .15s ease,background .15s ease,box-shadow .15s ease,transform .15s ease}
  .hook:hover{border-color:var(--line-2);box-shadow:var(--sh-1)}
  .hook:active{transform:scale(.99)}
  .hook .ic{width:14px;height:14px;color:var(--muted);margin-top:2px;flex:none}
  .hook span{flex:1}
  .hook .cp{opacity:.55;transition:opacity .15s ease}
  .hook:hover .cp{opacity:1}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:550;color:var(--amber-ink);
        background:var(--amber-bg);border:1px solid var(--amber-line);border-radius:999px;padding:5px 11px;margin-top:14px}
  .pill .ic{width:13px;height:13px}
  .pill.ok{color:var(--ok-ink);background:var(--ok-bg);border-color:var(--ok-line)}

  /* ===== Leads ===== */
  .leads{display:flex;flex-wrap:wrap;gap:8px}
  .lead{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);
        border-radius:999px;padding:9px 14px;font-size:13px;font-weight:500;color:var(--ink);cursor:pointer;
        box-shadow:var(--sh-1);transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease}
  .lead:hover{box-shadow:var(--sh-2);transform:translateY(-1px);border-color:var(--line-2)}
  .lead:active{transform:scale(.98)}
  .lead .ic{width:14px;height:14px;color:var(--muted)}

  footer{color:var(--muted);font-size:12px;text-align:center;margin-top:32px;line-height:1.7}

  /* ===== Toast ===== */
  #toast{position:fixed;left:50%;bottom:calc(26px + env(safe-area-inset-bottom));
         transform:translateX(-50%) translateY(16px) scale(.98);
         background:var(--accent);color:var(--accent-ink);padding:11px 16px;border-radius:12px;
         font-size:13.5px;font-weight:550;display:inline-flex;align-items:center;gap:8px;
         opacity:0;pointer-events:none;transition:opacity .22s ease,transform .22s cubic-bezier(.2,.8,.2,1);
         z-index:60;box-shadow:var(--sh-2)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  #toast .ic{width:15px;height:15px;color:var(--accent-ink)}

  .skel{height:78px;border-radius:16px;background:var(--surface);border:1px solid var(--line);
        box-shadow:var(--sh-1);position:relative;overflow:hidden}
  .skel::after{content:"";position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,color-mix(in srgb,var(--ink) 5%,transparent),transparent);
    transform:translateX(-100%);animation:sh 1.3s infinite}
  @keyframes sh{to{transform:translateX(100%)}}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important}
  }
</style>
</head>
<body>
  <header class="head">
    <div class="brand">
      <div class="logo" aria-hidden="true">
        <svg class="ic" viewBox="0 0 24 24"><path d="M3 7h18M3 12h18M3 17h18"/><circle cx="8" cy="7" r="1.6" fill="currentColor" stroke="none"/><circle cx="15" cy="12" r="1.6" fill="currentColor" stroke="none"/><circle cx="10" cy="17" r="1.6" fill="currentColor" stroke="none"/></svg>
      </div>
      <div class="htxt">
        <h1>Salon Demo Hub</h1>
        <div class="gen" id="gen"><span class="dot"></span><span id="gentxt">Yükleniyor…</span></div>
      </div>
    </div>
    <button id="install" type="button">
      <svg class="ic" viewBox="0 0 24 24"><path d="M12 3v12m0 0 4-4m-4 4-4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
      Ekle
    </button>
  </header>

  <div class="ios" id="ios">
    <svg class="ic" viewBox="0 0 24 24"><path d="M12 3v11m0 0 3.5-3.5M12 14l-3.5-3.5M5 14v4a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4"/></svg>
    <div><b>Ana ekrana ekle:</b> Safari'de alttaki <b>Paylaş</b> → <b>Ana Ekrana Ekle</b>. Sonra uygulama gibi açılır.</div>
  </div>

  <div class="stats" id="stats"></div>
  <div class="note" id="note" style="display:none"></div>

  <div class="sec"><svg class="ic" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18"/></svg><span>Canlı Demolar</span><div class="rule"></div></div>
  <div id="demos"><div class="skel"></div></div>

  <div class="sec"><svg class="ic" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="m10 9 5 3-5 3z" fill="currentColor" stroke="none"/></svg><span>GenauAlmanca Reel</span><div class="rule"></div></div>
  <div id="reel"></div>

  <div class="sec"><svg class="ic" viewBox="0 0 24 24"><path d="M20 10c0 6-8 11-8 11s-8-5-8-11a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="2.6"/></svg><span>Lead Bul (Maps)</span><div class="rule"></div></div>
  <div class="leads" id="leads"></div>

  <footer id="foot"></footer>
  <div id="toast" role="status" aria-live="polite"></div>

<script>
const $ = (id)=>document.getElementById(id);
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

const ICONS = {
  open:'<svg class="ic" viewBox="0 0 24 24"><path d="M9 6h9v9M18 6 6 18"/></svg>',
  copy:'<svg class="ic" viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>',
  copyHook:'<svg class="ic cp" viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>',
  chevron:'<svg class="ic" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>',
  hook:'<svg class="ic" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>',
  pin:'<svg class="ic" viewBox="0 0 24 24"><path d="M20 10c0 6-8 11-8 11s-8-5-8-11a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="2.6"/></svg>',
  check:'<svg class="ic" viewBox="0 0 24 24"><path d="m5 13 4 4L19 7"/></svg>',
  clock:'<svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
  info:'<svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/></svg>'
};

let TOA;
function toast(m){
  const t=$("toast");
  t.innerHTML=ICONS.check+"<span>"+esc(m)+"</span>";
  t.classList.add("show");clearTimeout(TOA);
  TOA=setTimeout(()=>t.classList.remove("show"),1800);
}
async function copy(text,label){
  try{ await navigator.clipboard.writeText(text); toast((label||"Kopyalandı")); return true; }
  catch(e){
    const ta=document.createElement("textarea");ta.value=text;
    ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.focus();ta.select();
    let ok=false;
    try{ok=document.execCommand("copy");toast((label||"Kopyalandı"));}catch{toast("Kopyalanamadı");}
    ta.remove();
    return ok;
  }
}

fetch("data.json",{cache:"no-store"}).then(r=>r.json()).then(d=>{
  $("gentxt").textContent = "Güncel · "+(d.generated||"");

  const c=d.counts||{};
  $("stats").innerHTML = [["demo","Demo"],["canli","Canlı"],["mesaj","Mesaj"]]
    .map(([k,l])=>`<div class="stat"><div class="n tnum">${c[k]??0}</div><div class="l">${l}</div></div>`).join("");

  if(d.note){ $("note").style.display="flex"; $("note").innerHTML = ICONS.info+"<div>"+esc(d.note)+"</div>"; }

  // demolar — live-tag SADECE veri-dürüst durum varsa (built / live === true)
  $("demos").innerHTML = (d.demos||[]).map((x,i)=>{
    const showLive = (x.built === true || x.live === true);
    const liveTag = showLive ? `<span class="live-tag"><span class="d"></span>Canlı</span>` : "";
    const thumb = x.thumb ? `<a class="thumb-wrap" href="${esc(x.live)}" target="_blank" rel="noopener">${liveTag}<img class="thumb" src="${esc(x.thumb)}" alt="${esc(x.ad)}" loading="lazy"></a>` : "";
    return `
    <div class="card">
      ${thumb}
      <div class="cb">
        <div class="nm"><span class="em">${esc(x.emoji)}</span> ${esc(x.ad)}</div>
        <div class="sg">${esc(x.segment)}</div>
        <div class="btns">
          <a class="btn primary" href="${esc(x.live)}" target="_blank" rel="noopener">${ICONS.open} Demoyu Aç</a>
          <button class="btn ghost" type="button" data-copy="${i}">${ICONS.copy}<span class="ct">Mesajı Kopyala</span></button>
        </div>
        ${x.mesaj?`<span class="seemsg" role="button" tabindex="0" data-see="${i}"><span class="lbl">Mesajı gör</span>${ICONS.chevron}</span><div class="msg" id="msg${i}"><div class="inner"><p>${esc(x.mesaj)}</p></div></div>`:""}
      </div>
    </div>`;}).join("");

  // reel
  const r=d.reel||{};
  const durumOk = /hazır|canlı|tamam|yayın/i.test(r.durum||"") && !/onay|bekl|kredi/i.test(r.durum||"");
  $("reel").innerHTML = `
    <div class="card reel">
      <div class="cb">
        <div class="nm">🎬 ${esc(r.baslik||"Reel")}</div>
        <div class="kon">${esc(r.konsept||"")}</div>
        ${(r.hooks||[]).length?'<div class="hk-lbl">Hook · tıkla kopyala</div>':''}
        <div class="hooks">${(r.hooks||[]).map(h=>`<button class="hook" type="button" data-hook="${esc(h)}">${ICONS.hook}<span>${esc(h)}</span>${ICONS.copyHook}</button>`).join("")}</div>
        ${r.durum?`<div class="pill ${durumOk?"ok":""}">${durumOk?ICONS.check:ICONS.clock}${esc(r.durum)}</div>`:""}
      </div>
    </div>`;

  // leads
  $("leads").innerHTML = (d.leads||[]).map(l=>`<a class="lead" href="${esc(l.url)}" target="_blank" rel="noopener">${ICONS.pin}${esc(l.label)}</a>`).join("");

  $("foot").innerHTML = "Veri-dürüst hub · demolar segment şablonu, göndermeden CONFIG'i kişiselleştir.<br>Bu sayfa herkese açıktır (GitHub Pages).";

  // events — kopyala butonu: in-place 'Kopyalandı' + check swap (toast'a ek)
  document.querySelectorAll("[data-copy]").forEach(b=>b.onclick=async()=>{
    const x=d.demos[+b.dataset.copy];
    const ok=await copy(x.mesaj||x.live, x.ad+" mesajı");
    if(ok){
      if(b._t) clearTimeout(b._t);
      b.classList.add("copied");
      b.innerHTML=ICONS.check+'<span class="ct">Kopyalandı</span>';
      b._t=setTimeout(()=>{ b.classList.remove("copied"); b.innerHTML=ICONS.copy+'<span class="ct">Mesajı Kopyala</span>'; },1500);
    }
  });
  document.querySelectorAll("[data-see]").forEach(s=>{
    const tog=()=>{
      const m=$("msg"+s.dataset.see); const open=m.classList.toggle("open");
      s.classList.toggle("open",open);
      s.querySelector(".lbl").textContent = open?"Mesajı gizle":"Mesajı gör";
    };
    s.onclick=tog;
    s.onkeydown=e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); tog(); } };
  });
  document.querySelectorAll("[data-hook]").forEach(h=>h.onclick=()=>copy(h.dataset.hook,"Hook kopyalandı"));
}).catch(e=>{
  $("demos").innerHTML="";
  $("note").style.display="flex";
  $("note").innerHTML = ICONS.info+"<div>Veri yüklenemedi: "+esc(e.message)+"</div>";
});

// install (Android/Chrome)
let deferred;
addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferred=e;$("install").style.display="inline-flex";});
$("install").onclick=async()=>{ if(deferred){deferred.prompt();deferred=null;$("install").style.display="none";} };

// iOS: beforeinstallprompt yok → talimat goster (standalone degilse)
const isiOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
const standalone=window.matchMedia("(display-mode: standalone)").matches||navigator.standalone;
if(isiOS && !standalone) $("ios").style.display="flex";

// service worker — network-first (telefon yeniden kurmadan guncellensin)
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
